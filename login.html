<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fontes -->
  <link href="https://cdnfonts.com" rel="stylesheet">

  <!-- CSS externo -->
  <link rel="stylesheet" href="estilo/login.css">
</head>

<body>
  <header>
    <nav class="navbar bg-blur">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="imagens/logo.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
          SuperTrain
        </a>
      </div>
    </nav>
  </header>

  <main>
    <div class="container d-flex flex-column align-items-center justify-center p-4 login-container ">
        <h1 class="welcome-title mb-4 text-center">
          Bem vindo a
          <span class="supertrain-title">SUPERTRAIN</span> !
        </h1>
          <div class="card p-4 shadow login-card bg-blur">

            <h1 class="text-center login-title">Login</h1>
            <form>
              <label for="usuario" class="form-label">Usuário</label>
              <input type="text" id="usuario" name="nomeUsuario" class="form-control mb-3" placeholder="Usuário"
                required>

              <label for="senha" class="form-label">Senha:</label>
              <input type="password" id="senha" name="senha" class="form-control mb-3" placeholder="Senha" required>

              <button type="submit" class="btn w-100 btn-login">
                Entrar
              </button>

              <p class="mb-0 mt-3">Não possui cadastro?</p>
                <a href="cadastro.html">Cadastre-se</a><br>
                <a href="recuperacao.html">Recuperar sua senha</a>
            </form>
          </div>

        </main>

        <footer></footer>
      </body>

      </html>
