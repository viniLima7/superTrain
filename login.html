<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link href="https://cdnfonts.com" rel="stylesheet">
</head>
<body>
    <header>
    <!-- NAV -->
      <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="imagens/logo.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top"/>
            SuperTrain
          </a>
        </div>
      </nav>
</header>

<main>

  <!-- Container principal que centraliza tudo na tela -->
  <div class="flex">
    
   <div class="mb-4">
      <h1 class="fw-light text-white font-family: 'Lovelo', sans serif;">
        Bem vindo a <span class="text-danger fw-black text-uppercase tracking-wide" style="color: #699EC2; font-family: 'Helios Extend', 'Arial Black', sans-serif; 
        font-weight: bold; font-style: italic;">SUPERTRAIN</span> !</h1>
    </div>

    <div class="container-central" >
    <form>
  <label for="usuario">Usuário</label>
  <input type="text" id="usuario" name="nomeUsuario" placeholder="Usuário">

    <label for="senha">Senha:</label>
  <input type="password" id="senha" name="senha" required>

  <div class="vstack gap-2 col-md-3 mx-auto"><button type="submit" class="btn btn-primary">Entrar</button>
</div>
</div>
</form>
</div>
</div>

</main>
<footer></footer>
</body>


</html>
