<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="estilo/rotas.css">
  <title>Rotas</title>

</head>

<body>

  <header>
    <!-- NAV -->
    <nav class="navbar navbar-expand-lg bg-blur">
      <div class="container-fluid">
        <a class="navbar-brand" href="dashboard.html"><img src="imagens/logo.png" alt="Logo"
            style="width: 5rem;">SuperTrain</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02"
          aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#">Rotas</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="sensores.html">Sensores</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="dashboard.html">Dashboard</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="trens.html">Trens</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <!-- CARD CADASTRO -->
    <div class="container col-xxl-5">
      <h3 class="col-md mx-auto text-center my-5 mb-4">Salve a rota</h3>

      <div class="card bg-blur">
        <div class="card-body p-5">

          <h2 class="card-title text-center mt-3">Informações</h2>

          <div class="mb-4">
            <label for="emailUsuario" class="form-label mb-0">Linha:</label>
            <select name="" id="selectLinha" class="form-select">
              <option value="norte/sul">Norte → Sul</option>
              <option value="norte/leste">Norte → Leste</option>
              <option value="norte/oeste">Norte → Oeste</option>

              <option value="sul/norte">Sul → Norte</option>
              <option value="sul/leste">Sul → Leste</option>
              <option value="sul/oeste">Sul → Oeste</option>

              <option value="leste/norte">Leste → Norte</option>
              <option value="leste/sul">Leste → Sul</option>
              <option value="leste/oeste">Leste → Oeste</option>

              <option value="oeste/norte">Oeste → Norte</option>
              <option value="oeste/sul">Oeste → Sul</option>
              <option value="oeste/leste">Oeste → Leste</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="selectPartida" class="form-label mb-0">Horário de partida:</label>
            <select name="" id="selectPartida" class="form-select">
              <option selected value="5.3">5:30</option>
              <option value="6">6:00</option>
              <option selected value="6.3">6:30</option>
              <option value="7">7:00</option>
              <option selected value="7.3">7:30</option>
              <option value="8">8:00</option>
              <option selected value="9.3">9:30</option>
              <option value="11">11:00</option>
              <option selected value="12">12:00</option>
              <option value="12.3">12:30</option>
              <option selected value="13">13:00</option>
              <option value="13">13:30</option>
              <option value="15">15:00</option>
              <option selected value="16.3">16:30</option>
              <option value="17.3">17:30</option>
              <option selected value="18">18:00</option>
              <option value="18.3">18:30</option>
              <option selected value="19">19:00</option>
              <option value="19.3">19:30</option>
              <option selected value="20.3">20:30</option>
              <option value="21.3">21:30</option>
              <option value="22.3">22:30</option>
              <option value="23.3">23:30</option>
            </select>
          </div>

          <div class="mb-4">
            <label for="tipoTrem" class="form-label mb-0">Tipo:</label>
            <select name="" id="selectTipo" class="form-select">
              <option selected value="passageiro">Passageiro</option>
              <option value="carga">Carga</option>
            </select>
          </div>

          <div class="vstack gap-2 col-md-3 mx-auto"><button type="submit" class="btn btn-cadastro ">Salvar rota</div>
        </div>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
