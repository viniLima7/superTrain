<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<title>Trens</title>

</head>

<body>
<div class="container py-4">
    <div class="painel">
        <h5 class="titulo">
            Clique para ver Status
        </h5>
        <div class="row header-grid text-center">
            <div class="col-2">Linha</div>
            <div class="col-3">Destino</div>
            <div class="col-3">Tipo</div>
            <div class="col-4">Status</div>
        </div>

        <div class="trens-lista">
            <div class="card-trem">
                <div class="row align-items-center text-center">

                    <div class="col-2">
                        <i class="bi bi-train-front-fill icone-trem"></i>
                        130
                    </div>
                    <div class="col-3 fw-bold">
                        Norte/Sul
                    </div>

                    <div class="col-3 tipo">
                        Passageiros
                    </div>

                    <div class="col-4">
                        <span class="badge badge-status ativo">
                            Ativo
                        </span>
                    </div>

                </div>
                <div class="info-expandida">

                    <div class="row">
                        <div class="col-md-6">
                            <small>Localização em tempo real</small>

                            <div class="mapa mt-2">
                                MAPA
                            </div>
                        </div>
                        <div class="col-md-6 text-center">
                            <small>Velocidade atual</small>

                            <div class="velocidade">
                                37
                                <span>Km/h</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-trem">
                <div class="row align-items-center text-center">
                    <div class="col-2">
                        <i class="bi bi-exclamation-triangle-fill icone-alerta"></i>
                        142
                    </div>
                    <div class="col-3">Oeste/Leste</div>
                    <div class="col-3 tipo">
                        Carga
                    </div>
                    <div class="col-4">
                        <span class="badge badge-status parado">
                            Parado
                        </span>
                    </div>
                </div>
            </div>
            <div class="card-trem">
                <div class="row align-items-center text-center">
                    <div class="col-2">
                        <i class="bi bi-train-front-fill icone-trem"></i>
                        078
                    </div>
                    <div class="col-3">Sul/Norte</div>

                    <div class="col-3 tipo">
                        Passageiro
                    </div>
                    <div class="col-4">
                        <span class="badge badge-status manutencao">
                            Manutenção
                        </span>
                    </div>
                </div>
            </div>
            <div class="card-trem">
                <div class="row align-items-center text-center">
                    <div class="col-2">
                        <i class="bi bi-train-front-fill icone-trem"></i>
                        145
                    </div>

                    <div class="col-3">Sul/Leste</div>

                    <div class="col-3 tipo">
                        Passageiro
                    </div>

                    <div class="col-4">
                        <span class="badge badge-status ativo">
                            Ativo
                        </span>
                    </div>
                </div>
            </div>

            <div class="card-trem">
                <div class="row align-items-center text-center">
                    <div class="col-2">
                        <i class="bi bi-exclamation-triangle-fill icone-alerta"></i>
                        097
                    </div>
                    <div class="col-3">Leste/Norte</div>
                    <div class="col-3 tipo">
                        Carga
                    </div>
                    <div class="col-4">
                        <span class="badge badge-status parado">
                            Parado
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
    
</body>
</html>
