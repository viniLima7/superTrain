  <head>
    <meta charset="UTF-8" />

      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="estilo/sensores.css">
    <title>Sensores</title>

  </head>

  <body>

    <header>
      <!-- NAV -->
      <nav class="navbar navbar-expand-lg bg-blur">
        <div class="container-fluid">
          <a class="navbar-brand" href="dashboard.html"><img src="imagens/logo.png" alt="Logo" style="width: 5rem;">SuperTrain</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarTogglerDemo02"
            aria-controls="navbarTogglerDemo02"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="sensores.html"
                  >Sensores</a
                >
              </li>

              <li class="nav-item">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="trens.html">Trens</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="rotas.html">Rotas</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>

         <div class="container col-xxl-5">
            <h3 class="col-md mx-auto text-center my-5 mb-4">Salve o sensor</h3>

            <div class="card bg-blur">
                <div class="card-body p-5">

                    <h2 class="card-title text-center mt-3">Informações</h2>

                    <div class="mb-4">
                        <label for="emailUsuario" class="form-label mb-0">Sensor:</label>
                        <select name="" id="selectLinha" class="form-select">
                            <option value="sensor-opcao">Selecione o sensor</option>
<option value="ultrassonico">Ultrassônico</option>
<option value="movimento">Movimento</option>
<option value="localizador">Localizador</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="selectPonto" class="form-label mb-0">Ponto do Sensor:</label>
                        <select name="" id="selectPonto" class="form-select">
                            <option value="sensor-opcao">Selecione o ponto</option>
                            <option selected value="ponto1">Iririu</option>
                            <option selected value="ponto2">Norte</option>
                            <option selected value="ponto3">Paraiso</option>
                            <option value="ponto4">Centro</option>
                        </select>
                    </div>

                    <div class="vstack gap-2 col-md-3 mx-auto"><button type="submit" class="btn btn-salvar-sensor">Salvar o sensor</div>
                </div>
            </div>
         </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
