<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trens</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="estilo/trens.css">

  <header>
      <!-- NAV -->
      <nav class="navbar navbar-expand-lg bg-blur">
        <div class="container-fluid">
          <a class="navbar-brand" href="dashboard.html"><img src="imagens/logo.png" alt="Logo" style="width: 5rem;">SuperTrain</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarTogglerDemo02"
            aria-controls="navbarTogglerDemo02"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#"
                  >Trens</a
                >
              </li>

              <li class="nav-item">
                <a class="nav-link" href="rotas.html">Rotas</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="sensores.html">Sensores</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

  <body>
    <main>
      <div class="container col-xxl-5 mt-5">
        <div class="card">
          <div class="row">
            <div class="col-xxl">
              <div class="table-responsive card-bg-blur">
                <table class="table table-hover text-center mb-0">
                  <thead>
                    <tr>
                      <th scope="col">Linha</th>
                      <th scope="col">Destino</th>
                      <th scope="col">Tipo</th>
                      <th scope="col">Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    <!-- PRIMEIRO TREM-->
                    <tr
                      data-bs-toggle="collapse"
                      data-bs-target="#detalhes-trem-1"
                      style="cursor: pointer"
                    >
                      <th scope="row">130</th>
                      <td>Norte/Sul</td>
                      <td>Passageiros</td>
                      <td>Ativo</td>
                    </tr>
                    <tr class="collapse" id="detalhes-trem-1">
                      <td colspan="4">
                        <div class="card m-2">
                          <div class="card-body">
                            <div class="row">
                              <div class="col-6">
                                <p class="text-center">
                                  Localização em tempo real
                                </p>
                                <div
                                  class="border rounded"
                                  style="height: 150px; overflow: hidden"
                                >
                                  <iframe
                                    src="https://maps.google.com/maps?q=Joinville&t=&z=14&ie=UTF8&iwloc=&output=embed"
                                    class="w-100 h-100 border-0"
                                    allowfullscreen=""
                                    loading="lazy"
                                  >
                                  </iframe>
                                </div>
                              </div>
                              <div
                                class="col-6 d-flex flex-column justify-content-between"
                              >
                                <div class="text-center">
                                  <p>Velocidade atual</p>
                                  <h2>
                                    37 <small class="text-muted">KM/h</small>
                                  </h2>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                  <button
                                    class="btn btn-sm btn-outline-secondary"
                                  >
                                    <i class="bi bi-pencil"></i>
                                  </button>
                                  <button
                                    class="btn btn-sm btn-outline-secondary"
                                  >
                                    <i class="bi bi-three-dots-vertical"></i>
                                  </button>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                    <!-- SEGUNDO TREM -->
                    <tr
                      data-bs-toggle="collapse"
                      data-bs-target="#detalhes-trem-2"
                      style="cursor: pointer"
                    >
                      <th scope="row">140</th>
                      <td>Sul/Norte</td>
                      <td>Carga</td>
                      <td>Ativo</td>
                    </tr>
                    <tr class="collapse" id="detalhes-trem-2">
                      <td colspan="4">
                        <div class="card m-2">
                          <div class="card-body">
                            <div class="row">
                              <div class="col-6">
                                <p class="text-center">
                                  Localização em tempo real
                                </p>
                                <div
                                  class="border rounded"
                                  style="height: 150px; overflow: hidden"
                                >
                                  <iframe
                                    src="https://maps.google.com/maps?q=Joinville&t=&z=14&ie=UTF8&iwloc=&output=embed"
                                    class="w-100 h-100 border-0"
                                    allowfullscreen=""
                                    loading="lazy"
                                  >
                                  </iframe>
                                </div>
                              </div>
                              <div
                                class="col-6 d-flex flex-column justify-content-between"
                              >
                                <div class="text-center">
                                  <p>Velocidade atual</p>
                                  <h2>
                                    45 <small class="text-muted">KM/h</small>
                                  </h2>
                                </div>
                                <div class="d-flex justify-content-end gap-2">
                                  <button
                                    class="btn btn-sm btn-outline-secondary"
                                  >
                                    <i class="bi bi-pencil"></i>
                                  </button>
                                  <button
                                    class="btn btn-sm btn-outline-secondary"
                                  >
                                    <i class="bi bi-three-dots-vertical"></i>
                                  </button>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
